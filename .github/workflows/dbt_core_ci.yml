name: dbt Core CI/CD

on:
  push:
    branches:
      - dev

jobs:
  dbt_run:
    name: Run dbt
    runs-on: ubuntu-latest

    env:
      # Common secrets
      DBT_ENV_SECRET_ACCOUNT: ${{ secrets.DBT_ENV_SECRET_ACCOUNT }}
      DBT_ENV_SECRET_USER: ${{ secrets.DBT_ENV_SECRET_USER }}
      DBT_ENV_SECRET_DATABASE: ${{ secrets.DBT_ENV_SECRET_DATABASE }}
      DBT_ENV_SECRET_ROLE: ${{ secrets.DBT_ENV_SECRET_ROLE }}
      DBT_ENV_SECRET_WAREHOUSE: ${{ secrets.DBT_ENV_SECRET_WAREHOUSE }}
      DBT_ENV_SECRET_SCHEMA: ${{ secrets.DBT_ENV_SECRET_SCHEMA }}
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt_profiles

      # Key-pair secrets and path
      DBT_PRIVATE_KEY_PATH: ${{ github.workspace }}/snowflake_key.p8

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "us-east-1" # Or your S3 bucket region

      - name: Create Snowflake Private Key File from Secret
        run: |
          echo "${{ secrets.DBT_SNOWFLAKE_PRIVATE_KEY }}" > ${{ env.DBT_PRIVATE_KEY_PATH }}
          

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dbt and adapter
        run: |
          pip install dbt-snowflake cryptography

      # ⬇️ **MODIFIED STEP**: Download manifest from S3
      - name: Download production manifest from S3
        run: |
          mkdir -p ${{ github.workspace }}/snowflake_masters_code/prod_state
          aws s3 cp s3://snowflake-stage1.s3.pricesmart.com/dbt/manifest.json ${{ github.workspace }}/snowflake_masters_code/prod_state/manifest.json || echo "No manifest found in S3."
        # The '||' part prevents an error if the file doesn't exist on the first run

      - name: Run dbt
        run: |
          cd ${{ github.workspace }}/snowflake_masters_code
          # The logic here remains the same!
          if [ -f "target/manifest.json" ]; then
            echo "✅ Manifest found, running modified models only."
            dbt build --select state:modified+ --state ./prod_state --defer
          else
            echo "🤷 No manifest found, running all models for initial run."
            dbt build
          fi

      # ⬆️ **MODIFIED STEP**: Upload manifest to S3
      - name: Upload new manifest to S3
        run: |
          aws s3 cp ${{ github.workspace }}/snowflake_masters_code/target/manifest.json s3://snowflake-stage1.s3.pricesmart.com/dbt/